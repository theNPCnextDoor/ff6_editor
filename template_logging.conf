[loggers]
keys=root

[logger_root]
level=DEBUG
handlers=console,file

[formatters]
keys=simple,complex

[formatter_simple]
format=%(asctime)s - %(levelname)s - %(message)s

[formatter_complex]
format=%(asctime)s - %(levelname)s - %(module)s.py:%(lineno)d - %(message)s

[handlers]
keys=file,console

[handler_file]
class=FileHandler
formatter=complex
level=DEBUG
args=('mt.log',)

[handler_console]
class=StreamHandler
formatter=simple
level=INFO
args=(sys.stdout,)